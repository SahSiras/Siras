    <script>
        const room = document.getElementById('room');
        const photos = document.querySelectorAll('.photo');

        let draggedPhoto = null;
        let offsetX = 0, offsetY = 0;

        // Sürükleme Başlangıcı
        photos.forEach(photo => {
            photo.addEventListener('mousedown', (e) => {
                draggedPhoto = photo;
                offsetX = e.offsetX;
                offsetY = e.offsetY;
                photo.style.cursor = 'grabbing';
            });

            photo.addEventListener('mouseup', () => {
                draggedPhoto = null;
                photo.style.cursor = 'grab';
            });
        });

        // Sürükleme İşlemi
        room.addEventListener('mousemove', (e) => {
            if (draggedPhoto) {
                const roomRect = room.getBoundingClientRect();
                const x = e.clientX - roomRect.left - offsetX;
                const y = e.clientY - roomRect.top - offsetY;

                // Div'i yeni konuma taşı
                draggedPhoto.style.left = `${x}px`;
                draggedPhoto.style.top = `${y}px`;
                
                // 233px kontrolü: Sol pozisyon (left) 233 pikseli geçtiyse fotoğrafı büyüt
                if (x > 155) {
                    draggedPhoto.style.transform = 'scale(3)'; // Fotoğrafı %20 büyüt
                    
                } else {
                    draggedPhoto.style.transform = 'scale(1.2)'; // Normal boyuta dön
                }
                
                
           
            }
        });
    </script>
